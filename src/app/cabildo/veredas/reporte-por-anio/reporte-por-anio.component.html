<section class="reporte-por-anio-page p-4">
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="page-header d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3 mb-4">
        <div>
          <h1 class="h3 mb-2">{{ title }}</h1>
          <p class="text-muted mb-0">{{ description }}</p>
        </div>
      </div>

      <div class="filters mb-4 p-3 bg-light rounded">
        <label class="form-label mb-3">Seleccionar año:</label>
        <div class="row gap-2">
          <div class="col-12 col-sm-auto">
            <input type="number" class="form-control" placeholder="2024" min="2000" max="2099">
          </div>
          <div class="col-12 col-sm-auto">
            <button class="btn btn-primary">Generar reporte</button>
          </div>
        </div>
      </div>

      <div class="row gap-3 mb-4">
        <div class="col-12 col-lg-6">
          <div class="info-card p-3">
            <h2 class="h5">Resumen del año</h2>
            <ul class="list-unstyled">
              <li><i class="fa fa-calendar text-primary me-2"></i> <strong>Fecha inicio:</strong> 01/01</li>
              <li><i class="fa fa-calendar text-primary me-2"></i> <strong>Fecha fin:</strong> 31/12</li>
              <li><i class="fa fa-chart-line text-success me-2"></i> <strong>Actividades registradas:</strong> 0</li>
            </ul>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="info-card p-3">
            <h2 class="h5">Opciones de exportación</h2>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-primary">
                <i class="fa fa-file-pdf me-1"></i> PDF
              </button>
              <button class="btn btn-sm btn-outline-success">
                <i class="fa fa-file-excel me-1"></i> Excel
              </button>
              <button class="btn btn-sm btn-outline-info">
                <i class="fa fa-print me-1"></i> Imprimir
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="alert alert-info">
        <strong>📊 Próximas mejoras</strong>
        <ul class="mb-0">
          <li>Gráficos comparativos de años anteriores.</li>
          <li>Análisis de actividades por vereda.</li>
          <li>Datos desagregados por trimestre y mes.</li>
        </ul>
      </div>
    </div>
  </div>
</section>
